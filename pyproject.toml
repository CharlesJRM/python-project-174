[tool.poetry]
name = "hexlet-code"
version = "0.1.0"
description = "Generador de diferencias entre archivos."
authors = ["CharlesJRM <140403739+CharlesJRM@users.noreply.github.com>"]
readme = "README.md"
packages = [
  { include = "gendiff" },
]

[tool.poetry.dependencies]
python = ">=3.10,<4.0"
pyyaml = "^6.0.2"

[tool.poetry.scripts]
gendiff = "gendiff.scripts.gendiff:main"

[build-system]
requires = ["poetry-core>=2.0.0,<3.0.0"]
build-backend = "poetry.core.masonry.api"

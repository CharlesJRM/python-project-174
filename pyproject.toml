[project]
name = "hexlet-code"
version = "0.1.0"
description = "Generador de diferencias entre archivos."
authors = [
    {name = "CharlesJRM", email = "140403739+CharlesJRM@users.noreply.github.com"}
]
readme = "README.md"
requires-python = ">=3.10,<4.0"
dependencies = [
    "pyyaml (>=6.0.2,<7.0.0)"
]

[build-system]
requires = ["poetry-core>=2.0.0,<3.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry.scripts]
gendiff = "gendiff.scripts.gendiff:main"

[tool.poetry]
packages = [
    { include = "gendiff" }
]
